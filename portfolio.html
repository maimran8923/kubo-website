<script>
  // Hamburger menu
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  hamburger.addEventListener('click', function() {
    mobileMenu.style.display = mobileMenu.style.display === 'block' ? 'none' : 'block';
  });
  mobileMenu.querySelectorAll('a').forEach(a =>
    a.addEventListener('click', () => { mobileMenu.style.display = 'none'; })
  );
  document.addEventListener('click', function(e) {
    if (!e.target.closest('nav')) mobileMenu.style.display = 'none';
  });

  // Category expand / collapse
  document.querySelectorAll('.gallery-collapsible').forEach(function(grid) {
    grid.style.maxHeight = 'none';
  });

  // If a collapse/expand gets interrupted partway by another call (e.g. a
  // fast scroll re-triggers the auto check before the previous animation
  // finished), the transitionend listener from the interrupted call was
  // never removed and would fire later -- against whichever transition
  // happened to finish next (including the unrelated opacity transition,
  // since no propertyName filter was applied) -- forcibly snapping
  // max-height back to 'none' (full height) in the middle of what should
  // have been a collapse. That's what caused a manual collapse click to
  // "flash and revert", and caused sudden full-height pop-ins during fast
  // scrolling. Always clearing any pending handler before starting a new
  // transition, and filtering to the max-height property only, prevents it.
  function clearPendingMaxHeightHandler(grid) {
    if (grid._maxHeightHandler) {
      grid.removeEventListener('transitionend', grid._maxHeightHandler);
      grid._maxHeightHandler = null;
    }
  }

  // Auto (scroll-driven) calls pass instant=true: a fast scroll gesture can
  // cover the same document distance faster than the 0.45s grow animation
  // can keep up with, so the section is measurably shorter than its real
  // height for a moment -- which lets the same scroll gesture "outrun" it
  // and blow straight past into whatever's above/below, feeling like a
  // jump straight to another section. Applying the change instantly for
  // auto-triggered calls means the document is always its true full size
  // by the very next frame, no matter how fast the user scrolls. Manual
  // clicks keep the smooth animation since that's a deliberate, isolated
  // interaction, not fighting against continuous scroll input.
  function collapseCategory(header, instant) {
    const btn = header.querySelector('.category-toggle');
    const icon = btn.querySelector('.toggle-icon');
    const grid = header.nextElementSibling;
    if (btn.getAttribute('aria-expanded') === 'false') return;
    clearPendingMaxHeightHandler(grid);
    if (instant) {
      grid.style.transition = 'none';
      grid.style.maxHeight = '0';
      grid.style.opacity = '0';
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { grid.style.transition = ''; });
      });
    } else {
      // Pin current height first so the collapse animation has a start value
      grid.style.maxHeight = grid.scrollHeight + 'px';
      requestAnimationFrame(function() {
        grid.style.maxHeight = '0';
        grid.style.opacity = '0';
      });
    }
    btn.setAttribute('aria-expanded', 'false');
    icon.textContent = '▲';
  }

  function expandCategory(header, instant) {
    const btn = header.querySelector('.category-toggle');
    const icon = btn.querySelector('.toggle-icon');
    const grid = header.nextElementSibling;
    if (btn.getAttribute('aria-expanded') === 'true') return;
    clearPendingMaxHeightHandler(grid);
    btn.setAttribute('aria-expanded', 'true');
    icon.textContent = '▼';
    if (instant) {
      grid.style.transition = 'none';
      grid.style.maxHeight = 'none';
      grid.style.opacity = '1';
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { grid.style.transition = ''; });
      });
      return;
    }
    // Animate to a generous value, then remove the cap so late-loading images show fully
    grid.style.maxHeight = '5000px';
    grid.style.opacity = '1';
    const handler = function(e) {
      if (e.propertyName !== 'max-height') return;
      grid.style.maxHeight = 'none';
      grid.removeEventListener('transitionend', handler);
      grid._maxHeightHandler = null;
    };
    grid._maxHeightHandler = handler;
    grid.addEventListener('transitionend', handler);
  }

  const categoryHeaders = [...document.querySelectorAll('.category-sticky-header')];

  // Headers are plain position:sticky, all at the same top:62px -- there's
  // no stacking, so no header ever needs an offset bigger than that. This
  // lets the browser handle "only the currently-relevant one visible" for
  // free: a header only starts sticking once its own section scrolls up to
  // that point, and releases once its own section has scrolled fully past
  // (at which point the next section's header picks up the same way) --
  // exactly "swap to whichever category is current" with no JS bookkeeping
  // needed. An earlier position:fixed-based version showed the first
  // category's header immediately at page load, before the page had even
  // been scrolled past the hero title above it, overlapping the title.
  // Native sticky doesn't have that problem since it only engages once
  // actually scrolled to.

  // Jump back to an earlier category: expand it and scroll to it, collapse
  // everything else.
  function jumpToCategory(targetIndex) {
    categoryHeaders.forEach(function(header, i) {
      if (i === targetIndex) expandCategory(header); else collapseCategory(header);
    });
    categoryHeaders[targetIndex].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  categoryHeaders.forEach(function(header, index) {
    const btn = header.querySelector('.category-toggle');

    btn.addEventListener('click', function() {
      if (btn.getAttribute('aria-expanded') === 'false') {
        delete header.dataset.manualCollapse;
        jumpToCategory(index);
        return;
      }
      // Mark this as a deliberate user action so the auto scroll-check
      // below doesn't immediately re-expand it just because it's still
      // in view -- otherwise clicking to fold a section you're currently
      // looking at got undone by the very next scroll tick.
      header.dataset.manualCollapse = 'true';
      collapseCategory(header);
    });
  });

  // Auto-open a category once it's scrolled into view. This checks each
  // grid's actual position directly on every scroll, rather than relying on
  // IntersectionObserver's 0%/>0% threshold crossing -- a fast or instant
  // scroll can jump a whole section from "not yet reached" straight to
  // "already passed" without ever sampling it as partially visible, which
  // meant its threshold never crossed and it silently never got expanded.
  //
  // Categories are never auto-collapsed. Auto-collapsing a category above
  // the current scroll position shrinks the document above the viewport,
  // which can leave it shorter than the current scroll position -- the
  // browser then clamps scrollY to fit, which reads as the page suddenly
  // jumping backward. Manual collapse (clicking a category header) still
  // works; it just isn't undone or triggered automatically by scrolling.
  function updateCategoryPositions() {
    categoryHeaders.forEach(function(header) {
      const grid = header.nextElementSibling;
      const rect = grid.getBoundingClientRect();
      const outOfView = rect.bottom < 0 || rect.top > window.innerHeight;
      if (outOfView) delete header.dataset.manualCollapse;
      if (rect.top < window.innerHeight && rect.bottom >= 0) {
        if (header.dataset.manualCollapse === 'true') return;
        expandCategory(header, true);
      }
    });
  }

  // Only auto-collapse/expand while scrolling DOWN. Reversing direction
  // leaves every category exactly as it is -- nothing resizes, so nothing
  // above the viewport can suddenly grow and shove the page down (which is
  // what caused the "jump to Interior" bug on the way back up). Scrolling
  // down again immediately self-corrects any state via the checks below.
  let scrollTicking = false;
  let lastScrollY = window.scrollY;
  window.addEventListener('scroll', function() {
    if (scrollTicking) return;
    scrollTicking = true;
    requestAnimationFrame(function() {
      const currentY = window.scrollY;
      if (currentY > lastScrollY) {
        updateCategoryPositions();
      }
      lastScrollY = currentY;
      scrollTicking = false;
    });
  }, { passive: true });

  updateCategoryPositions();

  // One-time "shine sweep" animation on each after-photo once it's mostly
  // scrolled into view (see .shine-play in styles.css). Unobserve
  // immediately so it only ever plays once per photo, not every time it
  // re-enters view. Threshold 0.8 (80% of the photo visible at once) --
  // note a wide desktop window has no gallery max-width, so a tall photo
  // can grow past the viewport height and never reach 80% simultaneous
  // visibility, silently skipping the sweep (this is why the threshold
  // was previously lowered from 0.85 to 0.5; raised back up on request).
  const shineTargets = document.querySelectorAll('.gallery-item:nth-child(odd) .photo-wrapper, .gallery-item.after-only .photo-wrapper, .masonry-item');
  if ('IntersectionObserver' in window) {
    const shineObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('shine-play');
          shineObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.8 });
    shineTargets.forEach(function(el) { shineObserver.observe(el); });
  } else {
    shineTargets.forEach(function(el) { el.classList.add('shine-play'); });
  }

  /* Border-trace flash on the "OUR WORK" header, same mechanism as the
     homepage (see index.html for the full history/gotchas). Fired once
     directly on load rather than via scroll-triggered IntersectionObserver
     -- .portfolio-hero-header is the first thing on the page, already on
     screen with no scroll needed, so it can never cross a scroll-based
     trigger line the way lower-page headers do. */
  function runTrace(frame) {
    if (frame.dataset.traceQueued) return;
    frame.dataset.traceQueued = '1';
    setTimeout(function() {
      frame.querySelectorAll('.trace-path').forEach(function(path) {
        path.classList.remove('play');
        void path.getBoundingClientRect();
        path.classList.add('play');
        path.addEventListener('animationend', function onDone() {
          path.classList.remove('play');
          path.removeEventListener('animationend', onDone);
        });
      });
    }, 80);
    setTimeout(function() {
      delete frame.dataset.traceQueued;
    }, 1030);
  }
  const heroTrace = document.querySelector('.portfolio-hero-header .trace-frame');
  if (heroTrace) {
    setTimeout(function() { runTrace(heroTrace); }, 400);
  }
</script>
<a href="index.html" class="floating-back-btn">← ホーム</a>
