<script>
  // Hamburger menu
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  hamburger.addEventListener('click', function() {
    mobileMenu.style.display = mobileMenu.style.display === 'block' ? 'none' : 'block';
  });
  mobileMenu.querySelectorAll('a').forEach(a =>
    a.addEventListener('click', () => { mobileMenu.style.display = 'none'; })
  );
  document.addEventListener('click', function(e) {
    if (!e.target.closest('nav')) mobileMenu.style.display = 'none';
  });

  // Category expand / collapse
  document.querySelectorAll('.gallery-collapsible').forEach(function(grid) {
    grid.style.maxHeight = 'none';
  });

  function collapseCategory(header) {
    const btn = header.querySelector('.category-toggle');
    const icon = btn.querySelector('.toggle-icon');
    const grid = header.nextElementSibling;
    if (btn.getAttribute('aria-expanded') === 'false') return;
    // Pin current height first so the collapse animation has a start value
    grid.style.maxHeight = grid.scrollHeight + 'px';
    requestAnimationFrame(function() {
      grid.style.maxHeight = '0';
      grid.style.opacity = '0';
    });
    btn.setAttribute('aria-expanded', 'false');
    icon.textContent = '▲';
  }

  function expandCategory(header) {
    const btn = header.querySelector('.category-toggle');
    const icon = btn.querySelector('.toggle-icon');
    const grid = header.nextElementSibling;
    if (btn.getAttribute('aria-expanded') === 'true') return;
    // Animate to a generous value, then remove the cap so late-loading images show fully
    grid.style.maxHeight = '5000px';
    grid.style.opacity = '1';
    btn.setAttribute('aria-expanded', 'true');
    icon.textContent = '▼';
    grid.addEventListener('transitionend', function handler() {
      grid.style.maxHeight = 'none';
      grid.removeEventListener('transitionend', handler);
    });
  }

  const NAV_HEIGHT = 62;
  const categoryHeaders = [...document.querySelectorAll('.category-sticky-header')];

  function stackHeader(header) {
    if (header.classList.contains('stacked')) return;
    const rect = header.getBoundingClientRect();
    header.style.width = rect.width + 'px';
    header.style.left = rect.left + 'px';
    header.classList.add('stacked');
    restackFixedHeaders();
  }

  function unstackHeader(header) {
    if (!header.classList.contains('stacked')) return;
    header.classList.remove('stacked');
    header.style.top = '';
    header.style.left = '';
    header.style.width = '';
    restackFixedHeaders();
  }

  // Passed (stacked) headers pin one under another, in page order, below the nav.
  function restackFixedHeaders() {
    let offset = NAV_HEIGHT;
    categoryHeaders.forEach(function(header) {
      if (header.classList.contains('stacked')) {
        header.style.top = offset + 'px';
        offset += header.offsetHeight;
      }
    });
  }

  // While true, the scroll-triggered auto-fold observer ignores intersection
  // changes -- otherwise the layout reflow from a jump's expand/collapse
  // animations can transiently scroll other sections through the viewport
  // and cause the observer to override the states jumpToCategory just set.
  let suppressObserver = false;

  // Jump back to an earlier category: expand it and scroll to it, collapse
  // (and stack) everything before it, collapse (and un-stack) everything after.
  function jumpToCategory(targetIndex) {
    suppressObserver = true;
    categoryHeaders.forEach(function(header, i) {
      if (i === targetIndex) {
        unstackHeader(header);
        expandCategory(header);
      } else if (i < targetIndex) {
        collapseCategory(header);
        stackHeader(header);
      } else {
        collapseCategory(header);
        unstackHeader(header);
      }
    });
    categoryHeaders[targetIndex].scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(function() { suppressObserver = false; }, 900);
  }

  categoryHeaders.forEach(function(header, index) {
    const btn = header.querySelector('.category-toggle');
    const grid = header.nextElementSibling;

    btn.addEventListener('click', function() {
      if (header.classList.contains('stacked')) {
        jumpToCategory(index);
        return;
      }
      const expanded = btn.getAttribute('aria-expanded') === 'true';
      if (expanded) collapseCategory(header); else expandCategory(header);
    });

    // Auto-fold a category once its photos have been scrolled past (pinning
    // its header in the stack), and re-open it if scrolled back up into it.
    const scrollObserver = new IntersectionObserver(function(entries) {
      if (suppressObserver) return;
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          expandCategory(header);
          unstackHeader(header);
        } else if (entry.boundingClientRect.bottom < 0) {
          collapseCategory(header);
          stackHeader(header);
        }
      });
    }, { threshold: 0 });
    scrollObserver.observe(grid);
  });
</script>
